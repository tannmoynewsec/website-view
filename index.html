<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot Studio – Microsoft Sign-In</title>

  <!--
    ============================================================
    SETUP – READ BEFORE DEPLOYING
    ============================================================
    This page uses the Microsoft Authentication Library (MSAL) to
    require users to sign in with a Microsoft / Entra ID account
    before the Copilot Studio chat is shown.

    Before this page will work you MUST:

    1. Register an application in the Microsoft Entra admin centre
       (https://entra.microsoft.com) or Azure portal > App registrations.

    2. Under "Authentication" for the app registration:
       - Add a Single-page application (SPA) redirect URI that matches
         where this page is hosted (e.g. https://yourusername.github.io/website-view/).
       - MSAL 2.x uses Authorization Code Flow with PKCE by default.
         You do NOT need to enable implicit grant (access tokens / ID tokens) for this page.
         Only enable implicit grant if you have a specific legacy requirement.

    3. Replace the two placeholder values in the CONFIG block below:
       - YOUR_CLIENT_ID   → the "Application (client) ID" from the app registration overview
       - YOUR_TENANT_ID   → your "Directory (tenant) ID", OR use "common" for any Entra account
    ============================================================
  -->

  <!-- MSAL Browser – loaded from the official Microsoft CDN (no build step required) -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #f3f2f1;
      color: #323130;
    }

    /* ── Top bar ── */
    header {
      background: #0078d4;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* ── Auth panel (shown when NOT signed in) ── */
    #auth-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
      padding: 40px 24px;
      text-align: center;
    }
    #auth-panel p {
      max-width: 480px;
      line-height: 1.5;
      color: #605e5c;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #signin-btn {
      background: #0078d4;
      color: #fff;
    }
    #signin-btn:hover { background: #106ebe; }

    #signout-btn {
      background: #e1dfdd;
      color: #323130;
      font-size: 0.85rem;
      padding: 6px 14px;
    }
    #signout-btn:hover { background: #c8c6c4; }

    /* ── Status / info message ── */
    #status-msg {
      font-size: 0.9rem;
      padding: 8px 14px;
      border-radius: 4px;
      background: #dff0d8;
      color: #3c763d;
      display: none; /* shown via JS once signed in */
    }
    #status-msg.error {
      background: #fde7e9;
      color: #a4262c;
    }

    /* ── Copilot iframe container (hidden until signed in) ── */
    #chat-container {
      display: none; /* shown via JS once signed in */
      flex: 1;
    }
    #chat-container iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      min-height: calc(100vh - 56px); /* full height minus header */
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <h1>Copilot Studio</h1>
    <!-- Sign-out button appears here after login -->
    <div style="margin-left:auto; display:flex; align-items:center; gap:12px;">
      <span id="user-display" style="font-size:0.9rem; opacity:0.9;"></span>
      <button id="signout-btn" class="btn" style="display:none;" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <!-- ── Auth panel (shown before sign-in) ── -->
  <div id="auth-panel">
    <h2 style="margin:0; font-size:1.4rem;">Sign in to access the assistant</h2>
    <p>This page requires a Microsoft account. Sign in to load the Copilot Studio chat experience.</p>

    <!-- Status / error message area -->
    <div id="status-msg" role="alert"></div>

    <!-- Sign-in button -->
    <button id="signin-btn" class="btn" onclick="signIn()">
      <!-- Microsoft logo icon (inline SVG, no external dependency) -->
      <svg width="20" height="20" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>
  </div>

  <!-- ── Copilot Studio iframe (hidden until signed in) ── -->
  <div id="chat-container">
    <!--
      Existing Copilot Studio webchat URL preserved from original index.html.
      If your bot requires an authenticated token, you will need to update
      this URL or add token-passing logic here.
      The "microphone" permission is passed through so users can interact
      with the Copilot Studio voice/speech features if enabled on the bot.
    -->
    <iframe
      src="https://copilotstudio.microsoft.com/environments/Default-a76b06e3-f400-49db-84df-e9a75fa473f6/bots/copilots_header_30895/webchat?__version__=2"
      title="Copilot Studio Webchat Interface"
      allow="microphone"
    ></iframe>
  </div>

  <script>
    // ==========================================================
    // CONFIG – replace these values before deploying
    // ==========================================================
    const MSAL_CONFIG = {
      auth: {
        // ① Replace with your app registration's Application (client) ID
        clientId: "YOUR_CLIENT_ID",

        // ② Replace with your tenant ID, e.g. "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
        //    Use "common" to allow any Entra / Microsoft account.
        authority: "https://login.microsoftonline.com/YOUR_TENANT_ID",

        // ③ Must match a redirect URI registered in your app registration (SPA platform).
        //    window.location.origin defaults to the current origin automatically.
        redirectUri: window.location.origin + window.location.pathname,
      },
      cache: {
        // Keeps the session across page refreshes; use "sessionStorage" for tab-only sessions.
        cacheLocation: "localStorage",
        storeAuthStateInCookie: false,
      },
    };
    // ==========================================================

    // Login scopes – "openid" and "profile" give us the user's display name.
    // Add additional scopes here if your Copilot Studio bot needs them.
    const LOGIN_SCOPES = ["openid", "profile", "User.Read"];

    // Initialise MSAL
    const msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);

    // MSAL error codes referenced in this script
    const MSAL_ERROR_USER_CANCELLED = "user_cancelled";

    // ── Helpers ────────────────────────────────────────────────

    function showSignedIn(account) {
      // Show the user's display name (or UPN as fallback)
      const name = account.name || account.username || "Signed in";
      document.getElementById("user-display").textContent = name;
      document.getElementById("signout-btn").style.display = "inline-flex";

      // Hide auth panel, show chat
      document.getElementById("auth-panel").style.display = "none";
      document.getElementById("chat-container").style.display = "block";
    }

    function showSignedOut() {
      document.getElementById("user-display").textContent = "";
      document.getElementById("signout-btn").style.display = "none";
      document.getElementById("auth-panel").style.display = "flex";
      document.getElementById("chat-container").style.display = "none";
      setStatus("", false);
    }

    function setStatus(message, isError) {
      const el = document.getElementById("status-msg");
      if (!message) {
        el.style.display = "none";
        el.textContent = "";
        return;
      }
      el.textContent = message;
      el.className = isError ? "error" : "";
      el.style.display = "block";
    }

    // ── Sign-in ────────────────────────────────────────────────

    async function signIn() {
      // Guard: alert if placeholders haven't been replaced
      if (
        MSAL_CONFIG.auth.clientId === "a3e4ac85-6272-4cc6-b553-f91e1019552f" ||
        MSAL_CONFIG.auth.authority.includes("a76b06e3-f400-49db-84df-e9a75fa473f6")
      ) {
        setStatus(
          "Configuration required: please replace YOUR_CLIENT_ID and YOUR_TENANT_ID in index.html before using this page.",
          true
        );
        return;
      }

      try {
        setStatus("", false);
        const response = await msalInstance.loginPopup({ scopes: LOGIN_SCOPES });
        if (response && response.account) {
          msalInstance.setActiveAccount(response.account);
          showSignedIn(response.account);
        }
      } catch (err) {
        // User closed the popup or another transient error – surface a friendly message
        if (err.errorCode !== MSAL_ERROR_USER_CANCELLED) {
          setStatus("Sign-in failed: " + (err.errorMessage || err.message), true);
        }
        console.error("MSAL loginPopup error:", err);
      }
    }

    // ── Sign-out ───────────────────────────────────────────────

    async function signOut() {
      const account = msalInstance.getActiveAccount();
      msalInstance.setActiveAccount(null);
      showSignedOut();

      // Optionally end the Entra session in the background (no redirect)
      if (account) {
        try {
          await msalInstance.logoutPopup({ account, mainWindowRedirectUri: window.location.href });
        } catch (err) {
          // Non-critical – local state is already cleared above
          console.warn("MSAL logoutPopup error (non-critical):", err);
        }
      }
    }

    // ── Restore session on page load ───────────────────────────

    (async function init() {
      // Handle redirect response if using redirect flow (not used here, but good practice)
      await msalInstance.initialize();
      await msalInstance.handleRedirectPromise();

      // Check whether an account is already cached from a previous visit
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) {
        msalInstance.setActiveAccount(accounts[0]);
        showSignedIn(accounts[0]);
      } else {
        showSignedOut();
      }
    })();
  </script>

</body>
</html>
